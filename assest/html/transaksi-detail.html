<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Detail Transaksi - Evotix</title>
    <link rel="icon" type="image/png" href="../img/icon-tiket-evotix.png" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body {
            background-color: #e9ecef;
            font-family: 'Segoe UI', sans-serif;
        }
        .receipt-container {
            max-width: 650px;
            margin: 3rem auto;
            background: white;
            border-radius: 1rem;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        .receipt-header {
            background-color: #28a745;
            color: white;
            padding: 2rem;
            border-radius: 1rem 1rem 0 0;
            text-align: center;
        }
        .receipt-header h2 {
            margin: 0;
            font-weight: 700;
        }
        .receipt-body {
            padding: 2rem;
        }
        .receipt-body .item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 1rem;
            padding-bottom: 1rem;
            border-bottom: 1px dashed #ccc;
        }
        .receipt-body .item:last-child {
            border-bottom: none;
            margin-bottom: 0;
        }
        .receipt-body .item span {
            color: #6c757d;
        }
        .receipt-body .item strong {
            color: #343a40;
        }
        .total-section {
            border-top: 2px solid #343a40;
            margin-top: 1.5rem;
            padding-top: 1.5rem;
            display: flex;
            justify-content: space-between;
            font-size: 1.25rem;
            font-weight: bold;
        }
        .receipt-footer {
            text-align: center;
            padding: 0 2rem 2rem;
        }
    </style>
</head>
<body>

    <div class="receipt-container">
        <div class="receipt-header">
            <i class="bi bi-check-circle-fill fs-1 mb-2"></i>
            <h2>Pembayaran Berhasil</h2>
            <p class="mb-0">Terima kasih telah melakukan transaksi di Evotix!</p>
        </div>
        <div class="receipt-body">
            <div class="item">
                <span>ID Transaksi</span>
                <strong id="trans-id">EVTX-XXXXXX</span>
            </div>
            <div class="item">
                <span>Tanggal</span>
                <strong id="trans-date">DD/MM/YYYY</span>
            </div>
            <div class="item">
                <span>Nama Event</span>
                <strong id="trans-event">-</span>
            </div>
            <div class="item">
                <span>Jumlah Tiket</span>
                <strong id="trans-qty">-</span>
            </div>
            <div class="item">
                <span>Metode Pembayaran</span>
                <strong id="trans-method">-</span>
            </div>
            <div class="total-section">
                <span>TOTAL</span>
                <span id="trans-total">Rp 0</span>
            </div>
        </div>
        <div class="receipt-footer">
            <p class="text-muted small mb-3">E-tiket Anda telah dikirim ke email dan juga dapat diakses melalui tombol di bawah.</p>
            <a href="tiket.html" class="btn btn-dark rounded-pill px-4">Lihat E-Tiket</a>
            <a href="beranda.html" class="btn btn-outline-secondary rounded-pill px-4 ms-2">Kembali ke Beranda</a>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const transaction = JSON.parse(localStorage.getItem("lastTransaction"));

            if (transaction) {
                document.getElementById('trans-id').textContent = transaction.id;
                document.getElementById('trans-date').textContent = new Date(transaction.date).toLocaleDateString('id-ID', { day: '2-digit', month: 'long', year: 'numeric' });
                document.getElementById('trans-event').textContent = transaction.eventTitle;
                document.getElementById('trans-qty').textContent = `${transaction.quantity} Tiket`;
                document.getElementById('trans-method').textContent = transaction.paymentMethod;
                document.getElementById('trans-total').textContent = `Rp ${transaction.total.toLocaleString('id-ID')}`;
            } else {
                // Jika tidak ada data, kembali ke beranda
                window.location.href = 'beranda.html';
            }
        });
    </script>

</body>
</html>
